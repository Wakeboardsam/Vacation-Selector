<!DOCTYPE html>
<html>
  <head>
    <script>
      // Mock google.script.run
      const mockData = {
        getPublicCalendarData: {
          calendarData: [
            {startDate: "Jun 1", classification: "Prime", person1: "-", person2: "-", person3: "-", person4: "-", spotsRemaining: 4},
            {startDate: "Oct 5", classification: "Non-Prime", person1: "-", person2: "-", person3: "-", person4: "-", spotsRemaining: 4}
          ],
          turnQueue: [
            {name: "Person1", queuePosition: 1, status: "Active"},
            {name: "Person2", queuePosition: 2, status: "Standby"},
            {name: "Person3", queuePosition: 3, status: "Backup"}
          ],
          currentRound: 1
        },
        getParticipantNames: ["Person1", "Person2", "Person3"],
        getDashboardData: {
          currentUser: {name: "Person1", queuePosition: 1, status: "Active"},
          turnQueue: [
            {name: "Person1", queuePosition: 1, status: "Active"},
            {name: "Person2", queuePosition: 2, status: "Standby"},
            {name: "Person3", queuePosition: 3, status: "Backup"}
          ],
          availableWeeks: [
            {displayDate: "Jun 1", valueDate: 12345, classification: "Prime", spotsRemaining: 4, originalClassification: "Prime"},
            {displayDate: "Oct 5", valueDate: 67890, classification: "Non-Prime", spotsRemaining: 4, originalClassification: "Non-Prime"}
          ],
          currentRound: 1
        }
      };

      window.google = {
        script: {
          run: {
            withSuccessHandler: function(callback) {
              return {
                getPublicCalendarData: function() { setTimeout(() => callback(mockData.getPublicCalendarData), 100); },
                getParticipantNames: function() { setTimeout(() => callback(mockData.getParticipantNames), 100); },
                getDashboardData: function(name) { setTimeout(() => callback(mockData.getDashboardData), 100); },
                verifyUser: function(name, pin) { setTimeout(() => callback("Success"), 100); },
                processSelection: function(data) { setTimeout(() => callback({success: true}), 100); }
              };
            },
            withFailureHandler: function(callback) {
                return this;
            }
          }
        }
      };
    </script>
  </head>
  <body>
    <script>
      fetch('Index.html')
        .then(response => response.text())
        .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            // Copy head
            Array.from(doc.head.childNodes).forEach(node => {
                if (node.tagName !== 'SCRIPT') document.head.appendChild(node.cloneNode(true));
            });
            // Copy body
            Array.from(doc.body.childNodes).forEach(node => {
                document.body.appendChild(node.cloneNode(true));
            });
            // Evaluate scripts
            Array.from(doc.scripts).forEach(script => {
                const newScript = document.createElement('script');
                newScript.textContent = script.textContent;
                document.body.appendChild(newScript);
            });

            // Re-fire DOMContentLoaded manually since it's already past
            setTimeout(() => {
                const event = document.createEvent('Event');
                event.initEvent('DOMContentLoaded', true, true);
                window.document.dispatchEvent(event);
            }, 500);
        });
    </script>
  </body>
</html>
