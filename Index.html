      (function() {
        try {
          var theme = localStorage.getItem('vacationSelectorTheme');
          if (theme === 'anesthesia' || theme === 'ketamine') {
            document.documentElement.setAttribute('data-theme', theme);
          } else {
            document.documentElement.setAttribute('data-theme', 'boring');
          }
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'boring');
        }
      })();
