<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        --primary-color: #3b82f6; /* Tailwind blue-500 */
        --primary-hover: #2563eb; /* Tailwind blue-600 */
        --bg-color: #f3f4f6; /* Tailwind gray-100 */
        --card-bg: #ffffff;
        --text-color: #1f2937; /* Tailwind gray-800 */
        --text-light: #6b7280; /* Tailwind gray-500 */
        --border-color: #e5e7eb; /* Tailwind gray-200 */
        --prime-bg: #fef3c7; /* Tailwind amber-100 */
        --prime-text: #92400e; /* Tailwind amber-800 */
        --full-bg: #fee2e2; /* Tailwind red-100 */
        --full-text: #b91c1c; /* Tailwind red-700 */
        --highlight-bg: #dbeafe; /* Tailwind blue-100 */
        --active-bg: #dcfce7; /* Tailwind green-100 */
        --active-text: #166534; /* Tailwind green-800 */
        --standby-bg: #fef08a; /* Tailwind yellow-200 */
        --standby-text: #854d0e; /* Tailwind yellow-800 */
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        max-width: 1200px;
        margin: 2rem auto;
        background-color: var(--card-bg);
        padding: 2rem;
        border-radius: 0.5rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      nav {
        background-color: #111827; /* Tailwind gray-900 */
        padding: 1rem;
        text-align: center;
        display: flex;
        justify-content: center;
        gap: 1rem;
        flex-wrap: wrap;
      }

      nav a {
        color: #e5e7eb;
        text-decoration: none;
        font-size: 1.125rem;
        font-weight: 500;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        transition: background-color 0.2s, color 0.2s;
        cursor: pointer;
      }

      nav a:hover {
        background-color: #374151; /* Tailwind gray-700 */
        color: #ffffff;
      }

      h1, h2, h3 {
        color: var(--text-color);
        margin-top: 0;
        font-weight: 600;
      }

      h1 { font-size: 2.25rem; margin-bottom: 1.5rem; text-align: center; }
      h2 { font-size: 1.5rem; margin-bottom: 1rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; }
      h3 { font-size: 1.25rem; margin-bottom: 0.75rem; }

      select, input, button {
        width: 100%;
        padding: 0.75rem 1rem;
        margin: 0.5rem 0 1.25rem 0;
        border-radius: 0.375rem;
        border: 1px solid var(--border-color);
        background-color: #f9fafb; /* Tailwind gray-50 */
        font-size: 16px;
        color: var(--text-color);
        box-sizing: border-box;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      select {
        min-height: 48px;
      }

      select:focus, input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        background-color: #ffffff;
      }

      button {
        background-color: var(--primary-color);
        color: white;
        cursor: pointer;
        border: none;
        font-weight: 500;
        transition: background-color 0.2s;
      }

      button:hover {
        background-color: var(--primary-hover);
      }

      button:disabled {
        background-color: #9ca3af; /* Tailwind gray-400 */
        cursor: not-allowed;
      }

      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin-top: 1rem;
        border: 1px solid var(--border-color);
        border-radius: 0.5rem;
        overflow: hidden;
      }

      th, td {
        border-bottom: 1px solid var(--border-color);
        padding: 0.75rem 1rem;
        text-align: left;
      }

      th {
        background-color: #f9fafb; /* Tailwind gray-50 */
        font-weight: 600;
        color: var(--text-light);
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      tbody tr:hover {
        background-color: #f9fafb;
      }

      .prime { background-color: var(--prime-bg) !important; color: var(--prime-text); }
      .full { background-color: var(--full-bg) !important; color: var(--full-text); text-decoration: line-through; }
      .highlight-pick { background-color: var(--highlight-bg) !important; font-weight: bold; color: var(--primary-hover); }

      ul.status-list {
        list-style-type: none;
        padding: 0;
        margin: 0;
      }

      ul.status-list li {
        margin: 0.5rem 0;
        padding: 0.5rem;
        background-color: #f9fafb;
        border: 1px solid var(--border-color);
        border-radius: 0.25rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      #public-container { display: flex; gap: 2rem; flex-wrap: wrap; }
      #public-status-container { flex: 1; min-width: 250px; }
      #public-calendar-container { flex: 3; min-width: 300px; }

      /* Make table scrollable on small screens */
      .table-wrapper {
          overflow-x: auto;
          width: 100%;
      }

      #login-container { max-width: 400px; }
      #dashboard-container { display: none; }

      #login-container h1 { font-size: 1.75rem; }

      #status { color: #dc2626; /* Tailwind red-600 */ font-weight: 500; text-align: center; }

      .status-badge {
        display: inline-block;
        padding: 0.25rem 0.5rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
      }
      .badge-prime { background-color: var(--prime-bg); color: var(--prime-text); }
      .badge-nonprime { background-color: #e5e7eb; color: var(--text-color); }

      /* Custom Picker Modal Styles */
      .picker-trigger {
        width: 100%;
        padding: 0.75rem 1rem;
        margin: 0.5rem 0 1.25rem 0;
        border-radius: 0.375rem;
        border: 1px solid var(--border-color);
        background-color: #f9fafb;
        font-size: 16px;
        color: var(--text-color);
        box-sizing: border-box;
        transition: border-color 0.2s, box-shadow 0.2s;
        text-align: left;
        display: flex;
        justify-content: space-between;
        align-items: center;
        min-height: 48px;
      }

      .picker-trigger:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        background-color: #ffffff;
      }

      .picker-trigger:disabled {
        background-color: #e5e7eb;
        color: var(--text-light);
        cursor: not-allowed;
      }

      .picker-trigger-icon {
        border: solid var(--text-light);
        border-width: 0 2px 2px 0;
        display: inline-block;
        padding: 3px;
        transform: rotate(45deg);
        -webkit-transform: rotate(45deg);
      }

      .modal-backdrop {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0.5);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .modal-panel {
        background-color: var(--card-bg);
        border-radius: 0.5rem;
        width: 90%;
        max-width: 500px;
        max-height: 80vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }

      .modal-header {
        padding: 1rem;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .modal-header h3 {
        margin: 0;
        font-size: 1.25rem;
      }

      .modal-close-btn {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--text-light);
        padding: 0;
        margin: 0;
        width: auto;
        line-height: 1;
      }

      .modal-close-btn:hover {
        background: none;
        color: var(--text-color);
      }

      .modal-body {
        padding: 0;
        overflow-y: auto;
      }

      .picker-section-title {
        padding: 0.75rem 1rem 0.25rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-light);
        text-transform: uppercase;
        background-color: #f9fafb;
        position: sticky;
        top: 0;
        z-index: 1;
      }

      .picker-row {
        width: 100%;
        text-align: left;
        background: none;
        border: none;
        border-bottom: 1px solid var(--border-color);
        padding: 0.75rem 1rem;
        min-height: 48px;
        display: flex;
        align-items: center;
        border-radius: 0;
        margin: 0;
        color: var(--text-color);
        font-size: 16px;
      }

      .picker-row:last-child {
        border-bottom: none;
      }

      .picker-row:hover, .picker-row:focus {
        background-color: #f3f4f6;
      }

      .picker-radio-circle {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid var(--border-color);
        margin-right: 1rem;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
      }

      .picker-row[aria-selected="true"] .picker-radio-circle {
        border-color: var(--primary-color);
      }

      .picker-row[aria-selected="true"] .picker-radio-circle::after {
        content: '';
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background-color: var(--primary-color);
      }

      .picker-row-content {
        display: flex;
        justify-content: space-between;
        width: 100%;
      }

      .picker-row-spots {
        color: var(--text-light);
        font-size: 0.875rem;
      }

      @media (max-width: 600px) {
        .modal-backdrop {
          align-items: flex-end;
        }
        .modal-panel {
          width: 100%;
          max-width: none;
          border-bottom-left-radius: 0;
          border-bottom-right-radius: 0;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a onclick="showView('public-container-wrapper')">Public Calendar</a>
      <a onclick="showView('login-container')">Login to Select</a>
    </nav>

    <div id="public-container-wrapper" class="container">
      <div id="public-container">
        <div id="public-status-container">
          <h2>Current Status</h2>
        </div>
        <div id="public-calendar-container">
          <h2>Public Calendar Grid</h2>
          <div id="highlighter-controls">
            <label for="name-highlighter">Highlight selections:</label>
            <select id="name-highlighter" onchange="highlightName(this)"><option value="">-- Show All --</option></select>
          </div>
          <div class="table-wrapper">
            <table id="calendar-table">
              <thead><tr><th>Week Of</th><th>Type</th><th>Person 1</th><th>Person 2</th><th>Person 3</th><th>Person 4</th><th>Status</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    
    <div id="login-container" class="container">
      <h1>Vacation Week Selection</h1>
      <select id="name-select"><option value="" selected>-- Select your name --</option></select>
      <input type="password" id="pin-input" placeholder="Enter your PIN">
      <button onclick="login()">Login</button>
      <div id="status"></div>
    </div>

    <div id="dashboard-container" class="container"></div>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        showView('public-container-wrapper');
        google.script.run.withSuccessHandler(displayPublicCalendar).getPublicCalendarData();
        google.script.run.withSuccessHandler(populateNames).getParticipantNames();
      });

      function showView(viewId) {
        document.getElementById('public-container-wrapper').style.display = 'none';
        document.getElementById('login-container').style.display = 'none';
        document.getElementById('dashboard-container').style.display = 'none';
        document.getElementById(viewId).style.display = 'block';
      }

      function displayPublicCalendar(data) {
        const statusDiv = document.getElementById("public-status-container");
        let statusHtml = '<ul class="status-list">';

        let allFull = true;
        data.calendarData.forEach(w => {
           if (w.spotsRemaining > 0) allFull = false;
        });

        if (allFull || data.calendarData.length === 0) {
            statusDiv.innerHTML = `<h2>Current Status</h2><p><b>Selection Complete:</b> All available vacation slots have been filled.</p>`;
        } else {
        // data.turnQueue is already sorted correctly from the backend
            let activeUsers = data.turnQueue.filter(p => ['Active', 'Standby', 'Backup'].includes(p.status));
            let nextUpUsers = data.turnQueue.filter(p => p.status === 'Waiting');

            nextUpUsers = nextUpUsers.slice(0, 10);

            statusHtml += `<li><b>Current Window (Round ${data.currentRound}):</b></li>`;
            activeUsers.forEach(p => { statusHtml += `<li>${p.status === 'Active' ? '🟢' : '🟡'} ${p.name} (#${p.queuePosition})</li>`; });
            statusHtml += `<li style="margin-top:10px;"><b>Next Up:</b></li>`;
            nextUpUsers.forEach(p => { statusHtml += `<li>${p.name} (#${p.queuePosition})</li>`; });
            statusHtml += `</ul>`;
            statusDiv.innerHTML += statusHtml;
        }

        const tbody = document.querySelector("#calendar-table tbody");
        tbody.innerHTML = '';
        data.calendarData.forEach(week => {
          let row = tbody.insertRow();
          if (week.classification === 'Prime') row.classList.add('prime');
          if (week.spotsRemaining === 0) row.classList.add('full');
          row.insertCell().textContent = week.startDate;
          row.insertCell().textContent = week.classification;
          row.insertCell().textContent = week.person1 || '-';
          row.insertCell().textContent = week.person2 || '-';
          row.insertCell().textContent = week.person3 || '-';
          row.insertCell().textContent = week.person4 || '-';
          row.insertCell().textContent = week.spotsRemaining > 0 ? `${week.spotsRemaining} spots left` : 'FULL';
        });
      }

      function highlightName(selectElement) {
        const selectedName = selectElement.value;
        const tableRows = document.querySelectorAll("#calendar-table tbody tr");
        tableRows.forEach(row => {
          for (let i = 2; i <= 5; i++) {
            const cell = row.cells[i];
            cell.classList.remove('highlight-pick');
            if (selectedName && cell.textContent === selectedName) {
              cell.classList.add('highlight-pick');
            }
          }
        });
      }

      function populateNames(names) {
        const nameSelects = [document.getElementById("name-select"), document.getElementById("name-highlighter")];
        nameSelects.forEach(select => {
          while (select.options.length > 1) { select.remove(1); }
          names.sort().forEach(name => {
            let option = document.createElement("option");
            option.text = name;
            option.value = name;
            select.add(option);
          });
        });
      }

      function login() {
        const name = document.getElementById("name-select").value;
        const pin = document.getElementById("pin-input").value;
        const statusDiv = document.getElementById("status");
        if (!name) {
          alert("Please select your name.");
          return;
        }
        statusDiv.textContent = "Checking...";
        google.script.run.withSuccessHandler(result => {
          if (result === "Success") {
            statusDiv.textContent = "";
            loadDashboard(name);
          } else {
            statusDiv.textContent = "Invalid PIN. Please try again.";
          }
        }).verifyUser(name, pin);
      }

      function loadDashboard(name) {
        showView('dashboard-container');
        google.script.run.withSuccessHandler(displayDashboard).getDashboardData(name);
      }

      function displayDashboard(data) {
        const container = document.getElementById('dashboard-container');

        let allFull = true;
        data.availableWeeks.forEach(w => {
           if (w.spotsRemaining > 0) allFull = false;
        });

        if (allFull || data.availableWeeks.length === 0) {
            container.innerHTML = `<div id="dashboard-content"><h2>Welcome, ${data.currentUser.name}</h2><h3>Selection Complete</h3><p>All vacation slots have been filled. The process is now complete.</p></div>`;
            return;
        }

        let html = `<div id="dashboard-content"><h2>Welcome, ${data.currentUser.name}</h2><h3>Current Status</h3><ul class="status-list" style="list-style-type:none;padding:0;">`;

        // data.turnQueue is already sorted correctly from the backend
        let activeUsers = data.turnQueue.filter(p => ['Active', 'Standby', 'Backup'].includes(p.status));
        let nextUpUsers = data.turnQueue.filter(p => p.status === 'Waiting');

        nextUpUsers = nextUpUsers.slice(0, 10);

        html += `<li><b>Current Window (Round ${data.currentRound}):</b></li>`;
        activeUsers.forEach(p => { html += `<li>${p.status === 'Active' ? '🟢' : '🟡'} ${p.name} (#${p.queuePosition})</li>`; });
        html += `<li style="margin-top:10px;"><b>Next Up:</b></li>`;
        nextUpUsers.forEach(p => { html += `<li>${p.name} (#${p.queuePosition})</li>`; });
        html += `</ul><div id="selection-area"></div></div>`;
        container.innerHTML = html;

        const canUserSelect = ['Active', 'Standby', 'Backup'].includes(data.currentUser.status);
        if (canUserSelect) {
            buildSelectionForm(data.availableWeeks, data.currentRound);
        } else {
          document.getElementById("selection-area").innerHTML = `<p>It is not your turn to make a selection.</p>`;
        }
      }

      // Store weeks globally for the custom picker to access
      let globalWeeksData = { prime: [], nonPrime: [], currentRound: 1 };

      function createWeekTrigger(id, placeholderText, isWeek2 = false) {
        // Container for hidden input and trigger button
        const container = document.createElement("div");

        // Hidden input to store the timestamp
        const hiddenInput = document.createElement("input");
        hiddenInput.type = "hidden";
        hiddenInput.id = id;
        hiddenInput.value = "";

        // Data type attribute for handling logic
        hiddenInput.dataset.type = "";

        // Trigger button
        const button = document.createElement("button");
        button.type = "button";
        button.id = `${id}-trigger`;
        button.className = "picker-trigger";

        const textSpan = document.createElement("span");
        textSpan.id = `${id}-text`;
        textSpan.textContent = placeholderText;
        button.appendChild(textSpan);

        const iconSpan = document.createElement("span");
        iconSpan.className = "picker-trigger-icon";
        button.appendChild(iconSpan);

        button.addEventListener("click", () => {
          openPicker(id, isWeek2);
        });

        container.appendChild(hiddenInput);
        container.appendChild(button);
        return container;
      }

      function buildSelectionForm(weeks, currentRound) {
        const formDiv = document.getElementById("selection-area");
        formDiv.innerHTML = "";

        const invalidClassifications = weeks.filter(w => w.classification === null);

        if (invalidClassifications.length > 0) {
            const badNames = [...new Set(invalidClassifications.map(w => w.originalClassification))].join(", ");
            formDiv.innerHTML = `<div style="background-color: #fee2e2; border-left: 4px solid #dc2626; padding: 1rem; margin-top: 1rem;">
                <h3 style="color: #b91c1c; margin-top: 0;">Week configuration error</h3>
                <p>Available weeks were found, but some have an invalid classification. Invalid classifications found: <strong>${badNames}</strong>.</p>
                <p>Please contact the administrator to fix the <em>Week Availability</em> sheet.</p>
            </div>`;
            return;
        }

        const primeWeeks = weeks.filter(w => w.classification === 'Prime');
        const nonPrimeWeeks = weeks.filter(w => w.classification === 'Non-Prime');

        // Store for picker to use later
        globalWeeksData = {
          prime: primeWeeks,
          nonPrime: nonPrimeWeeks,
          currentRound: currentRound
        };

        let headerHTML = `<h3>Your Turn to Select!</h3>`;
        if (currentRound === 1) {
            headerHTML += `<p><b>Rule Reminder:</b> Round 1 allows for exactly ONE week selection only (Prime or Non-Prime).</p>`;
        } else {
            headerHTML += `<p><b>Rule Reminder:</b> Select one Prime week OR one/two Non-Prime weeks.</p>`;
        }
        headerHTML += `<p style="font-size:0.9em; color:#6b7280;">Loaded ${weeks.length} selectable week(s) (${primeWeeks.length} Prime, ${nonPrimeWeeks.length} Non-Prime).</p>`;

        formDiv.innerHTML = headerHTML;

        // Week 1
        const week1Label = document.createElement("label");
        week1Label.setAttribute("for", "week1-trigger");
        week1Label.textContent = "Primary Week Selection:";
        formDiv.appendChild(week1Label);

        const week1Trigger = createWeekTrigger("week1", "-- Choose a week --", false);
        formDiv.appendChild(week1Trigger);

        // Week 2
        if (currentRound !== 1) {
            const week2Label = document.createElement("label");
            week2Label.setAttribute("for", "week2-trigger");
            week2Label.textContent = "Additional Non-Prime Week (optional):";
            formDiv.appendChild(week2Label);

            const week2Trigger = createWeekTrigger("week2", "-- No second week --", true);
            formDiv.appendChild(week2Trigger);

            const week2Warning = document.createElement("p");
            week2Warning.id = "week2-warning";
            week2Warning.style.color = "#854d0e";
            week2Warning.style.fontSize = "0.9em";
            week2Warning.style.display = "none";
            week2Warning.innerHTML = `<i>Warning: Choosing a second non-prime week will forfeit your next scheduled turn.</i>`;
            formDiv.appendChild(week2Warning);
        }

        const submitBtn = document.createElement("button");
        submitBtn.style.width = "100%";
        submitBtn.textContent = "Submit Selection";
        submitBtn.addEventListener("click", submitSelection);
        formDiv.appendChild(submitBtn);

        // Add modal DOM structure if it doesn't exist
        if (!document.getElementById("custom-picker-modal")) {
          createModalDOM();
        }
      }

      function createModalDOM() {
        const backdrop = document.createElement("div");
        backdrop.id = "custom-picker-modal";
        backdrop.className = "modal-backdrop";
        backdrop.setAttribute("role", "dialog");
        backdrop.setAttribute("aria-modal", "true");

        backdrop.innerHTML = `
          <div class="modal-panel" id="custom-picker-panel">
            <div class="modal-header">
              <h3 id="custom-picker-title">Choose a week</h3>
              <button class="modal-close-btn" id="custom-picker-close" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body" id="custom-picker-body">
              <!-- Content injected dynamically -->
            </div>
          </div>
        `;

        document.body.appendChild(backdrop);

        // Event listeners for closing
        backdrop.addEventListener("click", (e) => {
          if (e.target === backdrop) {
            closePicker();
          }
        });

        document.getElementById("custom-picker-close").addEventListener("click", closePicker);

        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape" && backdrop.style.display === "flex") {
            closePicker();
          }
        });
      }

      let activePickerId = null;

      function openPicker(id, isWeek2) {
        activePickerId = id;
        const modal = document.getElementById("custom-picker-modal");
        const body = document.getElementById("custom-picker-body");
        const title = document.getElementById("custom-picker-title");

        const currentValue = document.getElementById(id).value;

        body.innerHTML = "";
        title.textContent = isWeek2 ? "Choose second week" : "Choose a primary week";

        if (isWeek2) {
          // Add "No second week" choice
          const row = document.createElement("button");
          row.className = "picker-row";
          row.setAttribute("role", "option");
          row.setAttribute("aria-selected", currentValue === "" ? "true" : "false");
          row.innerHTML = `
            <div class="picker-radio-circle"></div>
            <div class="picker-row-content">
              <span>No second week</span>
            </div>
          `;
          row.addEventListener("click", () => selectWeek(id, "", null, "-- No second week --"));
          body.appendChild(row);

          // Non-Prime section
          if (globalWeeksData.nonPrime.length > 0) {
            const section = document.createElement("div");
            section.className = "picker-section-title";
            section.textContent = "Non-Prime";
            body.appendChild(section);

            globalWeeksData.nonPrime.forEach(week => {
              const weekRow = createPickerRow(id, week, currentValue, false);
              body.appendChild(weekRow);
            });
          }
        } else {
          // Primary week options
          if (globalWeeksData.prime.length > 0) {
            const section = document.createElement("div");
            section.className = "picker-section-title";
            section.textContent = "Prime";
            body.appendChild(section);

            globalWeeksData.prime.forEach(week => {
              const weekRow = createPickerRow(id, week, currentValue, true);
              body.appendChild(weekRow);
            });
          }

          if (globalWeeksData.nonPrime.length > 0) {
            const section = document.createElement("div");
            section.className = "picker-section-title";
            section.textContent = "Non-Prime";
            body.appendChild(section);

            globalWeeksData.nonPrime.forEach(week => {
              const weekRow = createPickerRow(id, week, currentValue, true);
              body.appendChild(weekRow);
            });
          }
        }

        modal.style.display = "flex";
      }

      function createPickerRow(pickerId, week, currentValue, includePrefix) {
        const row = document.createElement("button");
        row.className = "picker-row";
        row.setAttribute("role", "option");

        const stringValue = String(week.valueDate);
        row.setAttribute("aria-selected", currentValue === stringValue ? "true" : "false");

        const prefix = (includePrefix && week.classification) ? `${week.classification} — ` : "";
        const displayText = `${prefix}${week.displayDate}`;

        // Use textContent to prevent XSS
        const circle = document.createElement("div");
        circle.className = "picker-radio-circle";

        const contentDiv = document.createElement("div");
        contentDiv.className = "picker-row-content";

        const textSpan = document.createElement("span");
        textSpan.textContent = displayText;

        const spotsSpan = document.createElement("span");
        spotsSpan.className = "picker-row-spots";
        spotsSpan.textContent = `${week.spotsRemaining} spots left`;

        contentDiv.appendChild(textSpan);
        contentDiv.appendChild(spotsSpan);

        row.appendChild(circle);
        row.appendChild(contentDiv);

        // Pass the short display text to update the trigger button
        const buttonText = `${displayText} (${week.spotsRemaining} spots left)`;

        row.addEventListener("click", () => {
          selectWeek(pickerId, stringValue, week.classification, buttonText);
        });

        return row;
      }

      function closePicker() {
        const modal = document.getElementById("custom-picker-modal");
        modal.style.display = "none";
        if (activePickerId) {
          const trigger = document.getElementById(`${activePickerId}-trigger`);
          if (trigger) trigger.focus();
          activePickerId = null;
        }
      }

      function selectWeek(pickerId, value, classification, displayText) {
        // Update hidden input
        const input = document.getElementById(pickerId);
        input.value = value;
        input.dataset.type = classification || "";

        // Update trigger button text
        const textSpan = document.getElementById(`${pickerId}-text`);
        textSpan.textContent = displayText;

        // Run logic for week 1 / week 2 dependencies
        if (pickerId === "week1") {
          handleWeek1Change();
        } else if (pickerId === "week2") {
          handleWeek2Change();
        }

        closePicker();
      }

      function handleWeek1Change() {
        if (globalWeeksData.currentRound === 1) return; // Second week isn't shown

        const week1Input = document.getElementById("week1");
        const weekType = week1Input.dataset.type;
        const week2Trigger = document.getElementById('week2-trigger');
        const week2Input = document.getElementById('week2');
        const warningText = document.getElementById('week2-warning');
        const week2Text = document.getElementById('week2-text');

        if (weekType === 'Prime') {
          // Clear and disable week 2
          week2Input.value = "";
          week2Input.dataset.type = "";
          week2Trigger.disabled = true;
          week2Text.textContent = "Not available with a Prime week";
          warningText.style.display = 'none';
        } else {
          // Enable week 2
          week2Trigger.disabled = false;
          if (week2Input.value === "") {
            week2Text.textContent = "-- No second week --";
            warningText.style.display = 'none';
          } else {
            warningText.style.display = 'block';
          }
        }
      }

      function handleWeek2Change() {
        const week2Input = document.getElementById('week2');
        const warningText = document.getElementById('week2-warning');

        if (week2Input.value !== "") {
          warningText.style.display = 'block';
        } else {
          warningText.style.display = 'none';
        }
      }

      function submitSelection() {
        const week1 = document.getElementById("week1").value;
        const week2Element = document.getElementById("week2");
        const week2 = week2Element ? week2Element.value : "";
        const name = document.querySelector("#dashboard-content h2").textContent.replace("Welcome, ", "");
        if (!week1) {
          alert("Please select your primary week.");
          return;
        }

        // Find the correct submit button
        const submitBtn = Array.from(document.querySelectorAll("#selection-area button")).pop();
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.textContent = "Submitting...";
        }

        const selectionData = { name: name, week1: week1, week2: (week2 === "" ? null : week2) };
        google.script.run
          .withSuccessHandler(function(result){
            if(result.success){
              alert("Selection successful!");
            } else {
              alert("Error: "+result.message);
            }
            window.location.reload();
          })
          .withFailureHandler(function(error){
            alert("A critical error occurred: " + error.message);
            window.location.reload();
          })
          .processSelection(selectionData);
      }

    </script>
  </body>
</html>
