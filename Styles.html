<style>
:root {
  --bg-color: #F6F7FA;
  --surface-main: #FFFFFF;
  --text-primary: #171A22;
  --text-secondary: #6B7280;
  --accent-color: #5267E8;
  --accent-hover: #4052bf;
  --prime-tint: #FFF3D6;
  --prime-text: #92400e;
  --available-tint: #EAF8F0;
  --available-text: #166534;
  --limited-tint: #FFF4E5;
  --limited-text: #9a3412;
  --full-tint: #FDECEC;
  --full-text: #b91c1c;
  --border-radius: 18px;
  --border-color: rgba(0,0,0,0.05);
  --shadow-subtle: 0 4px 12px rgba(0, 0, 0, 0.05);
  --shadow-modal: 0 20px 40px rgba(0, 0, 0, 0.15);
  --disabled-bg: #E5E7EB;
  --disabled-text: #9CA3AF;
  --skeleton-bg: #E2E8F0;
}

@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background-color: var(--bg-color);
  color: var(--text-primary);
  margin: 0;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* Layout Containers */
.app-header {
  background-color: var(--surface-main);
  padding: 1rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  position: sticky;
  top: 0;
  z-index: 10;
}

.app-title {
  font-size: 1.25rem;
  font-weight: 700;
  margin: 0;
}

.auth-nav-link {
  color: var(--accent-color);
  text-decoration: none;
  font-weight: 500;
  cursor: pointer;
}

.main-container {
  max-width: 1200px;
  margin: 2rem auto;
  padding: 0 1rem;
  display: flex;
  gap: 2rem;
  flex-direction: column;
}

@media (min-width: 1024px) {
  .main-container {
    flex-direction: row;
    align-items: flex-start;
  }
}

.content-area {
  flex: 3;
}

.sidebar-area {
  flex: 1;
  min-width: 300px;
}

@media (min-width: 1024px) {
  .sidebar-area {
    position: sticky;
    top: 5rem;
  }
}

/* Cards */
.card {
  background-color: var(--surface-main);
  border-radius: var(--border-radius);
  padding: 1.5rem;
  box-shadow: var(--shadow-subtle);
  margin-bottom: 1.5rem;
  border: 1px solid var(--border-color);
}

h2 {
  font-size: 1.5rem;
  margin-top: 0;
  margin-bottom: 1rem;
  font-weight: 700;
}

h3 {
  font-size: 1.125rem;
  margin-top: 0;
  margin-bottom: 0.5rem;
  font-weight: 600;
}

p {
  color: var(--text-secondary);
  margin-top: 0;
  margin-bottom: 1rem;
}

/* Typography Helpers */
.text-bold { font-weight: 600; color: var(--text-primary); }
.text-small { font-size: 0.875rem; }

/* Filter Chips */
.filter-container {
  display: flex;
  gap: 0.75rem;
  overflow-x: auto;
  padding-bottom: 0.5rem;
  margin-bottom: 1.5rem;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none; /* Firefox */
}
.filter-container::-webkit-scrollbar {
  display: none; /* Safari and Chrome */
}

.chip {
  padding: 0.5rem 1rem;
  border-radius: 9999px;
  background-color: var(--surface-main);
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  font-weight: 500;
  font-size: 0.875rem;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.chip:hover {
  background-color: var(--bg-color);
}

.chip.active {
  background-color: var(--text-primary);
  color: var(--surface-main);
  border-color: var(--text-primary);
}

/* Week Cards (Grid) */
.week-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1rem;
}

@media (min-width: 600px) {
  .week-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 1200px) {
  .week-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.week-card {
  background-color: var(--surface-main);
  border-radius: var(--border-radius);
  padding: 1.25rem;
  box-shadow: var(--shadow-subtle);
  border: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.week-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.week-date {
  font-size: 1.125rem;
  font-weight: 700;
  margin: 0;
}

/* Badges */
.badge {
  display: inline-block;
  padding: 0.25rem 0.5rem;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.badge.prime { background-color: var(--prime-tint); color: var(--prime-text); }
.badge.available { background-color: var(--available-tint); color: var(--available-text); }
.badge.limited { background-color: var(--limited-tint); color: var(--limited-text); }
.badge.full { background-color: var(--full-tint); color: var(--full-text); }

/* Spots Dots */
.spots-indicator {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}
.spot-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1px solid var(--text-secondary);
}
.spot-dot.filled {
  background-color: var(--text-secondary);
  border-color: var(--text-secondary);
}

/* Participant List in Week Card */
.participant-list {
  font-size: 0.875rem;
  color: var(--text-secondary);
  margin: 0;
}
.highlight-name {
  background-color: var(--accent-color);
  color: white;
  padding: 0 4px;
  border-radius: 4px;
  font-weight: 600;
}

/* Forms & Buttons */
input[type="password"], input[type="text"], select {
  width: 100%;
  padding: 1rem;
  border-radius: 12px;
  border: 1px solid #d1d5db;
  background-color: var(--surface-main);
  font-size: 1rem;
  color: var(--text-primary);
  box-sizing: border-box;
  margin-bottom: 1rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus, select:focus {
  outline: none;
  border-color: var(--accent-color);
  box-shadow: 0 0 0 3px rgba(82, 103, 232, 0.2);
}

button {
  background-color: var(--accent-color);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 1rem;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  transition: background-color 0.2s;
  min-height: 48px;
}

button:hover:not(:disabled) {
  background-color: var(--accent-hover);
}

button:disabled {
  background-color: var(--disabled-bg);
  color: var(--disabled-text);
  cursor: not-allowed;
}

button.secondary {
  background-color: transparent;
  color: var(--text-primary);
  border: 1px solid #d1d5db;
}

button.secondary:hover:not(:disabled) {
  background-color: #f3f4f6;
}

button.text-only {
  background-color: transparent;
  color: var(--accent-color);
  padding: 0.5rem;
  width: auto;
  min-height: 0;
}
button.text-only:hover {
  text-decoration: underline;
}

/* Status Items (Dashboard/Queue) */
.status-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.75rem 0;
  border-bottom: 1px solid var(--border-color);
}
.status-item:last-child {
  border-bottom: none;
}
.status-icon {
  font-size: 1.25rem;
}
.status-details {
  display: flex;
  flex-direction: column;
}

/* Custom Bottom Sheet Modal */
.modal-backdrop {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-color: rgba(0, 0, 0, 0.4);
  display: none;
  justify-content: center;
  align-items: flex-end; /* Bottom sheet align */
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.modal-backdrop.visible {
  opacity: 1;
}

.modal-panel {
  background-color: var(--surface-main);
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  border-top-left-radius: 24px;
  border-top-right-radius: 24px;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-modal);
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

@media (min-width: 600px) {
  .modal-backdrop {
    align-items: center; /* Center on larger screens */
  }
  .modal-panel {
    border-radius: 24px;
    height: auto;
    max-height: 85vh;
  }
}

.modal-backdrop.visible .modal-panel {
  transform: translateY(0);
}

.modal-header {
  padding: 1.5rem;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background-color: var(--surface-main);
  border-top-left-radius: 24px;
  border-top-right-radius: 24px;
  z-index: 2;
}

.modal-header h3 {
  margin: 0;
  font-size: 1.25rem;
}

.modal-close-btn {
  background: none;
  border: none;
  font-size: 2rem;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 0;
  margin: 0;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.modal-close-btn:hover {
  background-color: #f3f4f6;
  border-radius: 50%;
}

.modal-body {
  padding: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.modal-footer {
  padding: 1.5rem;
  border-top: 1px solid var(--border-color);
  background-color: var(--surface-main);
  position: sticky;
  bottom: 0;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* Picker Rows */
.picker-row {
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  border-bottom: 1px solid var(--border-color);
  padding: 1.25rem 1.5rem;
  border-radius: 0;
  margin: 0;
  color: var(--text-primary);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.picker-row:hover {
  background-color: #f9fafb;
}

.picker-row-info {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}
.picker-row-date {
  font-size: 1.125rem;
  font-weight: 600;
}
.picker-row-meta {
  font-size: 0.875rem;
  color: var(--text-secondary);
}

.picker-radio {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid #d1d5db;
  display: flex;
  align-items: center;
  justify-content: center;
}
.picker-row.selected .picker-radio {
  border-color: var(--accent-color);
}
.picker-row.selected .picker-radio::after {
  content: "";
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background-color: var(--accent-color);
}

/* Picker Trigger Button */
.picker-trigger {
  background-color: var(--surface-main);
  border: 1px solid #d1d5db;
  color: var(--text-primary);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 500;
  margin-bottom: 1.5rem;
}
.picker-trigger:hover {
  background-color: #f9fafb;
}

/* Toasts */
.toast-container {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  z-index: 2000;
  pointer-events: none;
}
.toast {
  background-color: var(--text-primary);
  color: white;
  padding: 1rem 1.5rem;
  border-radius: 12px;
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  font-size: 0.875rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: auto;
}
.toast.show {
  opacity: 1;
  transform: translateY(0);
}
.toast.error {
  background-color: #dc2626;
}

/* Loading Skeleton */
.skeleton {
  background-color: var(--skeleton-bg);
  border-radius: 4px;
  animation: pulse 1.5s infinite ease-in-out;
}
.skeleton-text { height: 1rem; width: 100%; margin-bottom: 0.5rem; }
.skeleton-title { height: 1.5rem; width: 60%; margin-bottom: 1rem; }
.skeleton-card { height: 120px; width: 100%; border-radius: var(--border-radius); }

@keyframes pulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

.hidden { display: none !important; }
</style>
