name: Deploy to Google Apps Script

on:
  push:
    branches: [ main ] # Runs every time a PR is merged into main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Clasp
        run: npm install -g @google/clasp

      - name: Inject Clasp Credentials
        run: echo "$CLASP_CREDS" > ~/.clasprc.json
        env:
          CLASP_CREDS: ${{ secrets.CLASP_CREDENTIALS }}

      - name: Push to Apps Script
        # The -f flag forces the push, overwriting the script editor
        run: clasp push -f
